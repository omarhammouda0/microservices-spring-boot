server:
  port: 8761
eureka:
    client:
        register-with-eureka: false
        fetch-registry: false
    instance:
        hostname: localhost
        lease-renewal-interval-in-seconds: 5
        lease-expiration-duration-in-seconds: 10
    server:
        wait-time-in-ms-when-sync-empty: 0
spring:
    application:
        name: eureka-server

logging:
    level:
        org.springframework.cloud.gateway: debug