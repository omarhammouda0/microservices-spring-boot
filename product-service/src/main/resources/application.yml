server:
  port: 8082

spring:
  application:
    name: PRODUCT-SERVICE

  datasource:
    url: jdbc:postgresql://postgres-productdb:5432/productdb
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    hostname: product-service
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 10

resilience4j:
  retry:
    instances:
      userservice:
        max-attempts: 3
        wait-duration:
          seconds: 0.5
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        exponential-max-wait-duration:
          seconds: 2
        retry-exceptions:
          - feign.FeignException
          - java.lang.RuntimeException
          - feign.FeignException.ServiceUnavailable
          - org.springframework.cloud.client.loadbalancer.RetryableStatusCodeException
          - org.springframework.cloud.client.loadbalancer.ClientHttpResponseStatusCodeException
          - org.springframework.cloud.client.loadbalancer.reactive.RetryableStatusCodeException
          - java.lang.Exception

  circuitbreaker:
    instances:
      userservice:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - feign.FeignException

management:
  endpoints:
    web:
      exposure:
        include: health,circuitbreakers,circuitbreakerevents,retries,retryevents
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: debug